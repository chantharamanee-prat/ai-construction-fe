# Configuration for training
data: data.yaml
epochs: 200 # Increase epochs
imgsz: 640
batch: 8 # Reduce batch size for better gradient updates
device: 0
model_path: models/yolov8n.yaml
save_path: models/construction_progress.pt
export_format: onnx
learning_rate: 0.001 # Add explicit learning rate
weight_decay: 1e-4 # Add weight decay for regularization
scheduler: cosine # Add learning rate scheduler
early_stopping_patience: 20 # Add early stopping
validation_split: 0.2 # Add validation split
